<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TDD Todo List</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; }
        .task-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; }
        .completed { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>Minhas Tarefas</h1>
    
    <div>
        <input type="text" id="taskInput" placeholder="Nova tarefa...">
        <button id="addBtn">Adicionar</button>
    </div>

    <ul id="taskList"></ul>

    <script type="module" src="app.js"></script>
</body>
</html>
