<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatinhos Aleatórios</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        .container { text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 400px; max-height: 400px; border-radius: 10px; margin-top: 15px; display: none; }
        #loading { color: #666; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #6a11cb; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 Gatinho Aleatório</h1>
    <p id="loading">Buscando gatinho fofo...</p>
    <div id="error-message" style="color: red; display: none;">Erro ao carregar imagem.</div>
    <img id="cat-img" src="" alt="Um gatinho aleatório">
    <br>
    <button onclick="fetchCat()">Ver outro!</button>
</div>

<script>
    async function fetchCat() {
        const img = document.getElementById('cat-img');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-message');

        // Resetar estados
        img.style.display = 'none';
        loading.style.display = 'block';
        errorMsg.style.display = 'none';

        try {
            const response = await fetch('https://api.thecatapi.com/v1/images/search');
            if (!response.ok) throw new Error('Falha na API');
            
            const data = await response.json();
            
            // A API retorna um array [ { url: "..." } ]
            img.src = data[0].url;
            
            // Só mostra a imagem quando ela terminar de carregar de fato
            img.onload = () => {
                loading.style.display = 'none';
                img.style.display = 'inline-block';
            };
        } catch (error) {
            loading.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    }

    // Chama a função assim que a página abre
    window.onload = fetchCat;
</script>

</body>
</html>
